<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赏金契约 · 杀手任务</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Impact', '微软雅黑', sans-serif;
            letter-spacing: 1px;
        }

        body {
            background: 
                radial-gradient(circle at 20% 20%, rgba(20, 0, 0, 0.95) 0%, #000000 60%),
                linear-gradient(45deg, #0a0a0a 25%, #1a1111 75%);
            background-blend-mode: multiply;
            color: #d8d1c7;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle, rgba(139, 0, 0, 0.3) 1px, transparent 1px),
                linear-gradient(135deg, transparent 60%, rgba(100, 0, 0, 0.2) 100%);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: -1;
            opacity: 0.6;
        }

        #clock {
            position: fixed;
            top: 20px;
            right: 30px;
            font-size: 1.2rem;
            color: #26e0d0;
            text-shadow: 
                0 0 2px #6efffc,
                0 0 6px #6efffc,
                0 0 10px #6efffc,
                0 0 18px #6efffc,
                0 0 28px #6efffc,
                1px 1px 1px rgba(0,0,0,0.5),
                -1px -1px 1px rgba(17,17,17,0.5);
            z-index: 999;
            pointer-events: none;
            font-weight: 300;
            letter-spacing: 2px;
            font-family: '微软雅黑', 'Helvetica Neue', sans-serif;
            opacity: 1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .title {
            text-align: center;
            font-size: 3rem;
            color: #b71c1c;
            margin-bottom: 30px;
            text-shadow: 
                0 0 5px #000,
                2px 2px 0 #8b0000,
                0 0 20px rgba(183, 28, 28, 0.5);
            border-bottom: 2px solid #8b0000;
            padding-bottom: 10px;
            letter-spacing: 3px;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 25px;
        }

        .card {
            background: rgba(10, 10, 10, 0.92);
            border-radius: 8px;
            padding: 22px;
            box-shadow: 
                0 0 20px rgba(0, 0, 0, 0.8),
                0 0 0 1px #3a1111,
                0 4px 15px rgba(139, 0, 0, 0.3);
            border-left: 5px solid #b71c1c;
            position: relative;
            overflow: hidden;
        }

        .card::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, transparent 50%, rgba(139, 0, 0, 0.2) 50%);
            pointer-events: none;
        }

        .card-title {
            font-size: 1.4rem;
            color: #e53935;
            margin-bottom: 20px;
            border-bottom: 1px solid #4a1111;
            padding-bottom: 10px;
            text-shadow: 1px 1px 2px #000;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #a89a8e;
            font-size: 0.9rem;
        }

        input, textarea {
            width: 100%;
            padding: 11px;
            background: #141414;
            border: 1px solid #4a1111;
            border-radius: 4px;
            color: #f1f1f1;
            outline: none;
            transition: all 0.3s;
        }

        input:focus, textarea:focus {
            border-color: #b71c1c;
            box-shadow: 0 0 8px rgba(183, 28, 28, 0.5);
            background: #1a1111;
        }

        textarea {
            resize: vertical;
            min-height: 65px;
        }

        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            margin-right: 6px;
            text-transform: uppercase;
            font-size: 0.9rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .btn-primary {
            background: #b71c1c;
            color: #fff;
        }

        .btn-primary:hover {
            background: #d32f2f;
            box-shadow: 0 0 10px rgba(211, 47, 47, 0.6);
        }

        .btn-warning {
            background: #ff8f00;
            color: #000;
        }

        .btn-danger {
            background: #8b0000;
            color: #fff;
        }

        .btn-success {
            background: #2e7d32;
            color: #fff;
        }

        .btn-secondary {
            background: #3a3a3a;
            color: #fff;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
        }

        .file-import {
            margin-bottom: 18px;
            padding: 12px;
            background: #111;
            border-radius: 4px;
            border: 1px dashed #6a1111;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
            max-height: 620px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .task-item {
            background: #121212;
            border-radius: 6px;
            padding: 18px;
            border-left: 4px solid #8b0000;
            transition: transform 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.7);
        }

        .task-item:hover {
            transform: translateX(3px);
            border-left-color: #b71c1c;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .task-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #f5f5f5;
        }

        .task-type {
            background: #3a1111;
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 0.8rem;
            color: #e53935;
            border: 1px solid #6a1111;
        }

        .task-info {
            font-size: 0.9rem;
            color: #998a7e;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .countdown, .task-expire, .deadline-text {
            font-weight: 300;
            letter-spacing: 2px;
            font-family: '微软雅黑', 'Helvetica Neue', sans-serif;
        }

        .countdown {
            color: #00ff41;
            text-shadow: 0 0 3px #00ff41;
        }

        .task-expire {
            color: #e53935;
            text-shadow: 0 0 3px #000;
        }

        .task-btns {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .status {
            padding: 4px 9px;
            border-radius: 3px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .status-unfinish {
            background: #ff6f00;
            color: #000;
        }

        .status-finish {
            background: #b71c1c;
            color: #fff;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: #8b0000;
            border-radius: 2px;
        }

        .reward-stat {
            margin-top: 22px;
            padding: 16px;
            background: #111;
            border-radius: 6px;
            border: 1px solid #3a1111;
        }

        .reward-stat h3 {
            color: #e53935;
            margin-bottom: 10px;
        }

        .reward-stat p {
            color: #a89a8e;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div id="clock"></div>

    <div class="container">
        <h1 class="title">赏金契约 · 杀手任务</h1>
        
        <div class="main-layout">
            <div class="card">
                <h2 class="card-title">契约操作</h2>
                
                <div class="file-import">
                    <label>📂 导入契约数据</label>
                    <input type="file" id="importFile" accept=".json">
                    <button class="btn btn-secondary" id="exportBtn">💾 导出契约存档</button>
                </div>

                <form id="taskForm">
                    <input type="hidden" id="taskId">
                    
                    <div class="form-group">
                        <label>契约名称</label>
                        <input type="text" id="taskName" required placeholder="输入目标/任务名称">
                    </div>

                    <div class="form-group">
                        <label>契约类型</label>
                        <input type="text" id="taskType" required placeholder="自定义：猎杀/追踪/清除/悬赏">
                    </div>

                    <div class="form-group">
                        <label>截止期限</label>
                        <input type="datetime-local" id="deadline" required>
                    </div>

                    <div class="form-group">
                        <label>悬赏奖励</label>
                        <input type="text" id="reward" required placeholder="赏金/道具/货币">
                    </div>

                    <div class="form-group">
                        <label>契约详情</label>
                        <textarea id="description" placeholder="任务细节描述"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary" id="addBtn">发布契约</button>
                    <button type="button" class="btn btn-warning" id="updateBtn" style="display:none;">修改契约</button>
                    <button type="button" class="btn btn-secondary" id="cancelBtn" style="display:none;">取消</button>
                </form>

                <div class="reward-stat">
                    <h3>契约统计</h3>
                    <p>已完成猎杀：<span id="finishCount">0</span></p>
                    <p>总契约数：<span id="totalCount">0</span></p>
                </div>
            </div>

            <div class="card">
                <h2 class="card-title">契约清单（按到期时间排序）</h2>
                <div class="task-list" id="taskList">
                    <p style="text-align:center; color:#666;">暂无契约，等待发布...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('contractTasks')) || [];

        const taskForm = document.getElementById('taskForm');
        const taskId = document.getElementById('taskId');
        const taskName = document.getElementById('taskName');
        const taskType = document.getElementById('taskType');
        const deadline = document.getElementById('deadline');
        const reward = document.getElementById('reward');
        const description = document.getElementById('description');
        const addBtn = document.getElementById('addBtn');
        const updateBtn = document.getElementById('updateBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const taskList = document.getElementById('taskList');
        const finishCount = document.getElementById('finishCount');
        const totalCount = document.getElementById('totalCount');
        const importFile = document.getElementById('importFile');
        const exportBtn = document.getElementById('exportBtn');
        const clock = document.getElementById('clock');

        function updateClock() {
            const now = new Date();
            const options = { 
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            };
            clock.textContent = now.toLocaleString('zh-CN', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        function calculateCountdown(deadlineStr) {
            const now = new Date().getTime();
            const deadlineTime = new Date(deadlineStr).getTime();
            const diff = deadlineTime - now;

            if (diff < 0) {
                const overdueMs = Math.abs(diff);
                const day = Math.floor(overdueMs / (1000 * 60 * 60 * 24));
                const hour = Math.floor((overdueMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const min = Math.floor((overdueMs % (1000 * 60 * 60)) / (1000 * 60));
                return `【逾期 ${day}天${hour}时${min}分】`;
            }

            const day = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hour = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const min = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const sec = Math.floor((diff % (1000 * 60)) / 1000);
            return `剩余 ${day}天${hour}时${min}分${sec}秒`;
        }

        function sortTasksByDeadline() {
            tasks.sort((a, b) => {
                const timeA = new Date(a.deadline).getTime();
                const timeB = new Date(b.deadline).getTime();
                const now = Date.now();
                
                const aValid = timeA > now;
                const bValid = timeB > now;

                if (aValid && bValid) return timeA - timeB;
                if (aValid) return -1;
                if (bValid) return 1;
                return timeB - timeA;
            });
        }

        function saveTasksToLocalStorage() {
            localStorage.setItem('contractTasks', JSON.stringify(tasks));
            updateStats();
        }

        function exportJSON() {
            if (tasks.length === 0) {
                alert('暂无契约数据可导出！');
                return;
            }
            const jsonStr = JSON.stringify(tasks, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `赏金契约_${new Date().toLocaleDateString()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            alert('契约存档导出成功！');
        }

        function importJSON(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const importedTasks = JSON.parse(e.target.result);
                    if (Array.isArray(importedTasks)) {
                        tasks = importedTasks;
                        saveTasksToLocalStorage();
                        renderTasks();
                        alert('契约数据导入成功！');
                    } else {
                        alert('导入失败：文件格式错误（非数组）');
                    }
                } catch (err) {
                    alert('导入失败：文件格式错误');
                }
            };
            reader.readAsText(file);
        }

        function renderTasks() {
            sortTasksByDeadline();
            
            if (tasks.length === 0) {
                taskList.innerHTML = '<p style="text-align:center; color:#666;">暂无契约，等待发布...</p>';
                return;
            }

            taskList.innerHTML = '';
            tasks.forEach(task => {
                const timeStr = calculateCountdown(task.deadline);
                const isExpired = timeStr.includes('逾期');
                const taskItem = document.createElement('div');
                taskItem.className = 'task-item';
                
                taskItem.innerHTML = `
                    <div class="task-header">
                        <span class="task-name">${task.name}</span>
                        <span class="task-type">${task.type}</span>
                    </div>
                    <div class="task-info">
                        <p>📅 截止期限：<span class="deadline-text">${new Date(task.deadline).toLocaleString()}</span></p>
                        <p>⏳ ${isExpired ? `<span class="task-expire">${timeStr}</span>` : `<span class="countdown">${timeStr}</span>`}</p>
                        <p>💰 悬赏奖励：${task.reward}</p>
                        <p>📝 契约详情：${task.description || '无'}</p>
                        <p>状态：<span class="status ${task.isFinish ? 'status-finish' : 'status-unfinish'}">${task.isFinish ? '已猎杀' : '待执行'}</span></p>
                    </div>
                    <div class="task-btns">
                        <button class="btn btn-warning edit-btn" data-id="${task.id}">编辑</button>
                        <button class="btn ${task.isFinish ? 'btn-primary' : 'btn-success'} finish-btn" data-id="${task.id}">
                            ${task.isFinish ? '撤销完成' : '标记完成'}
                        </button>
                        <button class="btn btn-danger delete-btn" data-id="${task.id}">销毁</button>
                    </div>
                `;
                taskList.appendChild(taskItem);
            });
            bindBtnEvents();
        }

        function bindBtnEvents() {
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.onclick = () => {
                    const id = btn.dataset.id;
                    const task = tasks.find(t => t.id === id);
                    if (task) {
                        taskId.value = task.id;
                        taskName.value = task.name;
                        taskType.value = task.type;
                        deadline.value = new Date(task.deadline).toISOString().slice(0, 16);
                        reward.value = task.reward;
                        description.value = task.description || '';
                        addBtn.style.display = 'none';
                        updateBtn.style.display = 'inline-block';
                        cancelBtn.style.display = 'inline-block';
                    }
                };
            });

            document.querySelectorAll('.finish-btn').forEach(btn => {
                btn.onclick = () => {
                    const id = btn.dataset.id;
                    const task = tasks.find(t => t.id === id);
                    if (task) {
                        task.isFinish = !task.isFinish;
                        saveTasksToLocalStorage();
                        renderTasks();
                        if(task.isFinish) alert(`🩸 猎杀完成！自动领取悬赏：${task.reward}`);
                    }
                };
            });

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.onclick = () => {
                    const id = btn.dataset.id;
                    if (confirm('确定销毁该契约？')) {
                        tasks = tasks.filter(t => t.id !== id);
                        saveTasksToLocalStorage();
                        renderTasks();
                    }
                };
            });
        }

        function generateId() {
            return Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        }

        function updateStats() {
            const finished = tasks.filter(t => t.isFinish).length;
            finishCount.textContent = finished;
            totalCount.textContent = tasks.length;
        }

        taskForm.onsubmit = (e) => {
            e.preventDefault();
            const taskData = {
                name: taskName.value,
                type: taskType.value,
                deadline: deadline.value,
                reward: reward.value,
                description: description.value,
                isFinish: false
            };

            if (taskId.value) {
                const index = tasks.findIndex(t => t.id === taskId.value);
                if (index !== -1) {
                    tasks[index] = { ...tasks[index], ...taskData };
                }
            } else {
                taskData.id = generateId();
                tasks.push(taskData);
            }

            saveTasksToLocalStorage();
            taskForm.reset();
            taskId.value = '';
            addBtn.style.display = 'inline-block';
            updateBtn.style.display = 'none';
            cancelBtn.style.display = 'none';
            renderTasks();
        };

        cancelBtn.onclick = () => {
            taskForm.reset();
            taskId.value = '';
            addBtn.style.display = 'inline-block';
            updateBtn.style.display = 'none';
            cancelBtn.style.display = 'none';
        };

        exportBtn.onclick = exportJSON;

        importFile.onchange = (e) => {
            const file = e.target.files[0];
            if (file) importJSON(file);
        };

        setInterval(renderTasks, 1000);

        renderTasks();
        updateStats();
    </script>
</body>
</html>
